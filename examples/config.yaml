# Example pyclaw configuration
# Copy to ~/.pyclaw/config.yaml and customize
#
# Inline secret syntax: use ${source:id} anywhere a string is expected.
#   ${env:MY_VAR}          — read from environment variable MY_VAR
#   ${keychain:My Account} — read from system keychain (service=pyclaw)
#   ${file:~/.secret}      — read from a file (trimmed)
#   ${SOME_VAR}            — legacy bare form, reads env var SOME_VAR

version: "1.0"

# ─────────────────────────────────────────────
# Secrets providers (optional, used by inline syntax above)
# ─────────────────────────────────────────────
# secrets:
#   providers:
#     keychain:
#       source: keychain
#       service: pyclaw      # macOS Keychain service name (default: pyclaw)
#       backend: auto        # auto | keyring | macos
#
#     vault:
#       source: hashicorp_vault
#       addr: "http://localhost:8200"
#       token: "${env:VAULT_TOKEN}"
#       mount: "secret"

# ─────────────────────────────────────────────
# Per-model concurrency limits
# ─────────────────────────────────────────────
# concurrency:
#   default: 3   # optional global fallback; per-model limits live under providers.*.models

# ─────────────────────────────────────────────
# Session management
# ─────────────────────────────────────────────
sessions:
  persist_dir: "~/.pyclaw/sessions"
  ttl_hours: 24              # sessions idle > this many hours are reaped
  reaper_interval_minutes: 60

# ─────────────────────────────────────────────
# Gateway server
# ─────────────────────────────────────────────
gateway:
  host: "0.0.0.0"
  port: 8080
  debug: false
  log_level: "info"
  cors_origins:
    - "*"

# ─────────────────────────────────────────────
# Security
# ─────────────────────────────────────────────
security:
  execApprovals:
    mode: "allowlist"   # allowlist | denylist | all | none
    safe_bins:
      - /bin/ls
      - /bin/cat
      - /bin/echo
    always_approve:
      - localhost

  sandbox:
    enabled: true
    type: "docker"      # docker | none
    docker:
      image: "pyclaw-sandbox:latest"
      network: "none"
      memoryLimit: "512m"
      cpuLimit: 1.0
      pidsLimit: 100
      readOnly: true
      tmpSize: 100
      allowedVolumes: []

  audit:
    enabled: true
    log_file: "~/.pyclaw/logs/audit.log"
    retention_days: 90

  # Global denylist — always blocked regardless of per-channel allowedUsers
  # deniedUsers: [123456789]

# ─────────────────────────────────────────────
# Memory (per-agent markdown journals + optional vector search)
# ─────────────────────────────────────────────
memory:
  backend: "file"         # file backend stores daily journals in ~/.pyclaw/agents/
  # persist_dir: "~/.pyclaw/agents"

  # Vector search via embeddings (optional).
  # When enabled, memory_search ranks results by cosine similarity.
  # Run `memory_reindex` MCP tool after enabling to index existing entries.
  embedding:
    enabled: false
    provider: "openai"    # openai | gemini | local
    model: ""             # default: text-embedding-3-small (openai), models/text-embedding-004 (gemini)
    apiKey: "${env:OPENAI_API_KEY}"
    # baseUrl: "http://localhost:11434"   # for local / Ollama
    # dimensions: 0                       # 0 = provider default

  # Examples for other providers:
  # embedding:
  #   enabled: true
  #   provider: "gemini"
  #   apiKey: "${keychain:Gemini API Key}"
  #
  # embedding:
  #   enabled: true
  #   provider: "local"
  #   model: "nomic-embed-text"
  #   baseUrl: "http://localhost:11434"

# ─────────────────────────────────────────────
# Hooks (event-driven scripts)
# ─────────────────────────────────────────────
# hooks:
#   bundled:
#     session-memory:
#       enabled: true     # save session history to memory on command:reset
#     boot-md:
#       enabled: false    # inject MEMORY.md into agent context at gateway:startup
#   custom:
#     - event: "message:received"
#       handler: "~/.pyclaw/hooks/my_hook.py"
#       priority: 10
#       description: "My custom hook"

# ─────────────────────────────────────────────
# Providers (LLM API keys)
# ─────────────────────────────────────────────
providers:
  openai:
    enabled: true
    api_key: "${env:OPENAI_API_KEY}"
    defaultModel: "gpt-4"

  # Use inline secret syntax for ergonomic key referencing:
  minimax:
    enabled: true
    api_key: "${keychain:minimax-api-key}"   # reads from macOS Keychain
    api_url: "https://api.minimax.io/v1"
    # Per-model settings — concurrency limits here replace the concurrency.models section
    models:
      MiniMax-M2.5:
        priority: 1
        enabled: true
        concurrency: 3
      MiniMax-M1:
        priority: 2
        enabled: true
        concurrency: 5

# ─────────────────────────────────────────────
# Agents
# ─────────────────────────────────────────────
agents:
  default:
    name: "Assistant"
    model: "openai/gpt-4"
    maxTokens: 4096          # max output tokens (default: 16384)
    temperature: 0.7         # NOTE: not forwarded to FastAgent/MiniMax (no-op for those providers)
    system_prompt: "You are a helpful assistant."
    heartbeat:
      enabled: true
      every: "30m"
      prompt: "Pulse check"
      activeHours:
        start: "00:00"
        end: "23:59"
    # show_thinking: false         # strip <thinking>…</thinking> blocks before sending to user
    # typing_mode: "none"          # "typing" sends channel typing indicator while processing
    # top_p: 0.9                   # nucleus sampling (provider support varies)
    # max_iterations: 99           # max tool-call loops per turn
    # parallel_tool_calls: true    # allow simultaneous tool calls
    # streaming_timeout: 300       # seconds to wait for streaming completion
    #
    # request_params:              # forwarded to the LLM provider API call
    #   Known FastAgent fields (top_p, temperature, max_iterations, parallel_tool_calls,
    #   streaming_timeout, frequency_penalty, presence_penalty, etc.) are applied to
    #   RequestParams directly.  Everything else is forwarded as extra_body to the raw
    #   HTTP request, enabling provider-specific extensions.
    #
    #   Examples:
    #     request_params:
    #       frequency_penalty: 0.1
    #       presence_penalty: 0.0
    #
    #   MiniMax-specific — separates thinking from response in streaming:
    #     request_params:
    #       reasoning_split: true

  minimax:
    name: "MiniMax"
    model: "generic.MiniMax-M2.5"
    # MiniMax-M2.5: 204,800 token context window; up to ~196,608 output tokens
    # Reasoning tokens count against the output budget, so keep maxTokens generous.
    maxTokens: 16384         # increase toward 65536+ for long reasoning tasks
    system_prompt: "You are a helpful assistant."
    useFastagent: true
    heartbeat:
      enabled: false
    # reasoning_split separates thinking from response in streaming (MiniMax extension)
    request_params:
      reasoning_split: true

  minimax_m1:
    name: "MiniMax M1"
    model: "generic.MiniMax-M1"
    maxTokens: 16384
    system_prompt: "You are a helpful assistant."
    useFastagent: true
    heartbeat:
      enabled: false
    request_params:
      reasoning_split: true

# ─────────────────────────────────────────────
# Jobs (cron)
# ─────────────────────────────────────────────
jobs:
  enabled: true
  persist_file: "~/.pyclaw/jobs.json"

# ─────────────────────────────────────────────
# Channels
# ─────────────────────────────────────────────
channels:
  telegram:
    enabled: false
    botToken: "${env:TELEGRAM_BOT_TOKEN}"
    allowedUsers: []
    # deniedUsers: []           # always block these user IDs
    # typingIndicator: true     # send "typing…" while agent processes
    # streaming: false          # edit message in-place as chunks arrive (live typing effect)
    # topics:                   # forum topic name → topic ID (group chats with topics)
    #   general: 0
    #   alerts: 42

  # slack:
  #   enabled: false
  #   botToken: "${keychain:Slack Bot Token}"
  #   signingSecret: "${env:SLACK_SIGNING_SECRET}"
  #   threading: true            # reply in-thread when message is in a Slack thread
  #   allowedUsers: []           # Slack user IDs (strings) allowed to use the bot
  #   deniedUsers: []
  #   pulseChannel: "C1234567890"  # Slack channel ID to receive pulse/heartbeat messages

# ─────────────────────────────────────────────
# Channel plugins (third-party / custom channel adapters)
# ─────────────────────────────────────────────
plugins:
  # Load channel plugins by Python import spec "module:ClassName"
  # Plugins can also be discovered via entry points group "pyclaw.channels"
  channels: []
  # channels:
  #   - "mypackage.channels:DiscordPlugin"
  #   - "mypackage.channels:WhatsAppPlugin"

# ─────────────────────────────────────────────
# TUI
# ─────────────────────────────────────────────
tui:
  enabled: true
  theme: "dark"

# ─────────────────────────────────────────────
# Node API (peer-to-peer, advanced)
# ─────────────────────────────────────────────
# nodes:
#   enabled: true
#   node_id: "pyclaw-main"
#   requireApproval: true
#   # secretKey: "${env:NODE_SECRET}"
#   whitelist:
#     - node_id_1
#     - node_id_2
