# Example pyclopse agents configuration
# This YAML config compiles to FastAgent decorator code

# Default agent (used when no specific agent is specified)
default_agent: assistant

# Agent definitions
agents:
  # Simple agent
  assistant:
    instruction: "You are a helpful assistant."
    model: sonnet
    servers: []
  
  # Agent with MCP servers
  fetcher:
    instruction: "You can fetch URLs. Provide summaries of web pages."
    model: haiku
    servers: [fetch]
  
  # Code expert agent
  coder:
    instruction: "You are an expert Python developer. Write clean, well-documented code."
    model: sonnet
    servers: [filesystem]
  
  # Research agent
  researcher:
    instruction: "You research topics thoroughly. Provide detailed, accurate information with sources."
    model: sonnet
    servers: [fetch, search]
  
  # Order processing agent (for chain demo)
  order_agent:
    instruction: "You process customer orders. Collect order details accurately."
    model: sonnet
  
  # Shipping agent (for chain demo)
  ship_agent:
    instruction: "You handle shipping logistics. Determine best shipping methods."
    model: sonnet
  
  # Review agents (for parallel demo)
  proofreader:
    instruction: "You review text for grammar, spelling, and clarity."
    model: haiku
  
  fact_checker:
    instruction: "You verify factual accuracy of content."
    model: haiku
  
  style_enforcer:
    instruction: "You enforce writing style guidelines."
    model: sonnet
  
  grader:
    instruction: "You compile feedback and provide overall assessment."
    model: sonnet

# Workflow definitions
workflows:
  # Sequential chain: order_agent → ship_agent
  order_ship:
    chain:
      - order_agent
      - ship_agent
  
  # Parallel workflow: fan-out to reviewers, fan-in to grader
  parallel_review:
    parallel:
      fan_out:
        - proofreader
        - fact_checker
        - style_enforcer
      fan_in: grader
  
  # Router: route to appropriate agent based on request
  route:
    router:
      agents:
        - coder
        - fetcher
        - researcher
