default_model: passthrough
generic:
  api_key: ${GENERIC_API_KEY}
  base_url: ${GENERIC_BASE_URL}
mcp:
  servers:
    fetch:
      args:
      - mcp-server-fetch
      command: uvx
    filesystem:
      args:
      - /Users/localai/.npm/_npx/a3241bba59c344f5/node_modules/@modelcontextprotocol/server-filesystem/dist/index.js
      - ${HOME}
      - /tmp
      command: node
    pyclaw:
      url: http://localhost:8081/mcp
    time:
      args:
      - mcp-server-time
      - --local-timezone
      - America/New_York
      command: uvx
    chrome-devtools:
      command: chrome-devtools-mcp
mcp_timeline:
  step_seconds: 15
  steps: 20
